name: Daily payment reminders

on:
  schedule:
    # 09:00 Asia/Bangkok (UTC+7) = 02:00 UTC — heads-up push for filings
    # due tomorrow.
    - cron: "0 2 * * *"
    # 16:00 Asia/Bangkok = 09:00 UTC — once-daily nudge for filings due
    # today or already overdue (repeats daily from the due date until
    # paid, same as the old single-run behavior used to for everything).
    # GitHub Actions cron is UTC-only and best-effort (can fire a few
    # minutes late under load), so scripts/send-reminders.js reads
    # Asia/Bangkok wall-clock time at runtime — both for "today" (the
    # already-reminded-today check) and to tell which of these two runs
    # this is, rather than assuming an exact start.
    - cron: "0 9 * * *"
  workflow_dispatch: {} # lets someone re-run/test this on demand from the Actions tab

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # @supabase/supabase-js 2.110 requires a native WebSocket impl
          # (only present from Node 22+) to construct its Realtime
          # client — createClient() throws under Node 20 even though
          # this script never actually uses realtime subscriptions.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send reminders
        run: node scripts/send-reminders.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
